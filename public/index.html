		<title>Peanuts Image Service</title>
		<style>
			body {
				background: #efe798;
				margin: 0;
				font-family: 'Inter', sans-serif;
				overflow-x: hidden;
			}

			/* Main layout */
			.main {
				width: min(90%, 1664px);
				margin: 107px auto 0;

				min-height: calc(100dvh - 107px);

				display: flex;
				flex-direction: column;
				gap: clamp(24px, 4vw, 56px);
			}

			/* Header */
			.header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 20px;
			}

			/* Logo */
			.logo {
				max-width: 387px;
				width: 100%;
				height: auto;
			}

			/* Button / nav text */
			.button {
				font-size: clamp(16px, 1.3vw, 20px);
				line-height: 1.2;
				text-align: right;
				color: #000;
			}

			/* Image container */
			.image {
				flex: 1;

				background-image: url(https://peanuts.intelligencesystems.org/random);
				background-size: cover;
				background-position: bottom;

				border-radius: clamp(40px, 6vw, 100px) clamp(40px, 6vw, 100px) 0 0;
			}

			/* Tablet */
			@media (max-width: 900px) {
				.main {
					margin-top: 64px;
				}

				.header {
					flex-direction: column;
					align-items: flex-start;
				}

				.button {
					text-align: left;
				}
			}

			/* Mobile */
			@media (max-width: 500px) {
				.main {
					width: 92%;
					margin-top: 40px;
				}

				.image {
					border-radius: 40px 40px 0 0;
				}
			}
		</style>
